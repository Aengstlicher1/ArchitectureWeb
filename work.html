<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Work — [COMPANY NAME]</title>
<script src="./ds-base.js"></script>
<style>
:root { --leading: 28px; --half: 14px; --edge: clamp(20px, 5vw, 72px); --measure: 58ch; }
body { margin: 0; text-wrap: pretty; overflow-x: clip; }
.wrap { max-width: 1200px; margin: 0 auto; padding: 0 var(--edge); }
.nav { padding-inline: max(var(--edge), calc((100% - 1200px) / 2 + var(--edge))); position: sticky; top: 0;
  background: color-mix(in srgb, var(--color-bg) 92%, transparent); backdrop-filter: blur(6px); z-index: 10; }
.nav a { white-space: nowrap; }
.nav .btn { white-space: nowrap; }
@media (max-width: 640px) { .nav a { display: none; } }
.kicker { display: block; font-size: 13px; line-height: var(--half); letter-spacing: 0.06em;
  text-transform: uppercase; font-weight: 600; color: var(--color-accent-700);
  margin: 0 0 calc(var(--leading) - var(--half)); }

.p-head { padding: calc(2 * var(--leading)) 0 var(--leading); }
.p-title { font-family: var(--font-heading); font-weight: var(--font-heading-weight);
  font-size: clamp(32px, 4vw, 48px); line-height: calc(1.3 * var(--leading)); margin: 0; }

.controls { display: flex; flex-wrap: wrap; gap: var(--half); align-items: center;
  padding: var(--leading) 0; border-top: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
  border-bottom: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent); margin-bottom: var(--leading); }
.controls input.input { max-width: 260px; }
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { border: 1px solid var(--color-divider); background: transparent; color: var(--color-text);
  font-size: 13px; padding: 6px 14px; border-radius: 999px; cursor: pointer; font-family: var(--font-body);
  white-space: nowrap; }
.chip[aria-pressed="true"] { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }
.chip:hover:not([aria-pressed="true"]) { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }
.divider { width: 1px; align-self: stretch; background: var(--color-divider); }
@media (max-width: 700px) { .divider { display: none; } }

.work-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: calc(1.25 * var(--leading)) clamp(20px, 3vw, 48px);
  padding-bottom: calc(3 * var(--leading)); }
.proj-card { display: block; text-decoration: none; color: inherit; }
.proj-figure { margin: 0; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4 / 3; }
.proj-figure image-slot { width: 100%; height: 100%; transition: transform 0.5s ease; }
.proj-card:hover .proj-figure image-slot { transform: scale(1.035); }
.proj-meta { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-2); margin-top: var(--half); }
.proj-title { font-family: var(--font-heading); font-weight: var(--font-heading-weight); font-size: 21px; margin: 0; }
.proj-loc { font-size: 13px; color: color-mix(in srgb, var(--color-text) 65%, transparent); margin: 2px 0 0; }
.empty { padding: calc(2 * var(--leading)) 0; color: color-mix(in srgb, var(--color-text) 60%, transparent); display: none; }
@media (max-width: 880px) { .work-grid { grid-template-columns: 1fr; } }

footer { padding: calc(2 * var(--leading)) 0; display: flex; justify-content: space-between; flex-wrap: wrap;
  gap: var(--leading); font-size: 13px; line-height: var(--leading); color: color-mix(in srgb, var(--color-text) 70%, transparent); }
footer .col { min-width: 180px; }
footer .col-title { font-weight: 600; color: var(--color-text); margin-bottom: 6px; }
footer a { color: inherit; }
a { color: var(--color-accent-700); text-decoration: none; }
a:hover { color: var(--color-accent-800); text-decoration: underline; }

.btn-primary { box-shadow: 0 0 22px color-mix(in srgb, var(--color-accent) 34%, transparent); background: transparent !important; }
.btn-primary:hover, .btn-primary:active { box-shadow: 0 0 22px color-mix(in srgb, var(--color-accent-600) 38%, transparent); background: transparent !important; }
a.btn:hover, a.btn-primary:hover { text-decoration: none; }
a.btn-primary:hover { color: var(--color-bg); }
a.btn-secondary:hover, a.btn-ghost:hover { color: var(--color-text); }
#search-overlay { opacity: 0; transition: opacity 0.28s ease; }
#search-overlay.open { opacity: 1; }
#search-overlay .search-outer { transform-origin: top center; transform: scaleY(0.82) rotate(-0.5deg);
  transition: transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1); }
#search-overlay .search-inner { transform-origin: center; transform: scaleX(0.82);
  transition: transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) 0.07s; }
#search-overlay.open .search-outer { transform: scaleY(1) rotate(0deg); }
#search-overlay.open .search-inner { transform: scaleX(1); }
#nav-search-btn { border-radius: 999px; transition: background 0.2s ease, color 0.2s ease; }
#nav-search-btn:hover { background: color-mix(in srgb, var(--color-accent) 14%, transparent); color: var(--color-accent-700); }

.btn-primary { position: relative; color: var(--color-accent-700);
  border: 1.5px solid var(--color-accent); overflow: hidden; z-index: 0; transition: color 0.35s ease 0.05s;
  white-space: nowrap; --fx: 0%; --fy: 100%; }
.btn-primary::before { content: ""; position: absolute; inset: -1px; z-index: -1; border-radius: 6px;
  background: var(--color-accent); transform: translate(var(--fx), var(--fy)); transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), border-radius 0.4s ease; }
.btn-primary.fill-in { color: var(--color-bg); }
.btn-primary.fill-in::before { transform: translate(0, 0); border-radius: inherit; }
a.btn-primary:hover { color: var(--color-bg); }

.reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
.reveal.is-visible { opacity: 1; transform: translateY(0); }
.reveal-stagger > * { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
.reveal-stagger.is-visible > * { opacity: 1; transform: translateY(0); }
.reveal-stagger.is-visible > *:nth-child(1) { transition-delay: 0.05s; }
.reveal-stagger.is-visible > *:nth-child(2) { transition-delay: 0.12s; }
.reveal-stagger.is-visible > *:nth-child(3) { transition-delay: 0.19s; }
.reveal-stagger.is-visible > *:nth-child(4) { transition-delay: 0.26s; }
.reveal-stagger.is-visible > *:nth-child(5) { transition-delay: 0.33s; }
.reveal-stagger.is-visible > *:nth-child(6) { transition-delay: 0.4s; }
@media (prefers-reduced-motion: reduce) {
  .reveal, .reveal-stagger > * { opacity: 1; transform: none; transition: none; }
}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand" style="text-decoration:none;color:inherit;">[COMPANY NAME]</a>
  <a href="work.html">Work</a>
  <a href="index.html#studio">Studio</a>
  <a href="index.html#services">Services</a>
  <a href="index.html#contact">Contact</a>
  <button type="button" class="btn btn-primary">Start a project</button>
  <button type="button" class="btn btn-icon" id="nav-search-btn" aria-label="Search the site (⌘/Ctrl + Space)" title="Search (⌘/Ctrl + Space)" aria-haspopup="dialog">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
  </button>
</nav>

<div id="search-overlay" style="display:none; position:fixed; inset:0; z-index:200; background:color-mix(in srgb, var(--color-neutral-900) 55%, transparent); backdrop-filter:blur(2px); align-items:flex-start; justify-content:center;">
 <div class="search-outer" style="width:100%; max-width:640px; margin:12vh 0 0;">
  <div class="search-inner" style="background:var(--color-bg); border-radius:var(--radius-lg); padding:var(--space-3); box-shadow:var(--shadow-lg);">
    <input type="search" id="site-search-input" placeholder="Search projects, services, pages…" aria-label="Search the site"
      style="width:100%; box-sizing:border-box; font-size:18px; font-family:var(--font-body); padding:12px 14px; border:1px solid var(--color-divider); border-radius:var(--radius-md); background:var(--color-surface); color:var(--color-text);" />
    <div id="site-search-results" style="margin-top:var(--half); max-height:50vh; overflow-y:auto; scrollbar-width:none;"></div>
    <style>#site-search-results::-webkit-scrollbar{display:none;}</style>
  </div>
 </div>
</div>

<div class="wrap">
  <section class="p-head reveal">
    <span class="kicker">Selected work</span>
    <h1 class="p-title">All projects</h1>
  </section>

  <section class="controls reveal">
    <input class="input" type="search" id="search" placeholder="Search by name or location…" aria-label="Search projects" />
    <div class="divider"></div>
    <div class="chip-group" id="type-filters">
      <button type="button" class="chip" aria-pressed="true" data-type="all">All styles</button>
      <button type="button" class="chip" data-type="residential">Residential</button>
      <button type="button" class="chip" data-type="renovation">Renovation</button>
      <button type="button" class="chip" data-type="interior">Interior Architecture</button>
      <button type="button" class="chip" data-type="commercial">Commercial</button>
    </div>
    <div class="divider"></div>
    <div class="chip-group" id="loc-filters">
      <button type="button" class="chip" aria-pressed="true" data-loc="all">All locations</button>
      <button type="button" class="chip" data-loc="mosta">Mosta</button>
      <button type="button" class="chip" data-loc="mellieha">Mellieħa</button>
      <button type="button" class="chip" data-loc="mdina">Mdina</button>
      <button type="button" class="chip" data-loc="sliema">Sliema</button>
      <button type="button" class="chip" data-loc="gozo">Gozo</button>
    </div>
  </section>

  <section class="work-grid reveal-stagger" id="grid"></section>
  <p class="empty" id="empty">No projects match — try a different search or filter.</p>

  <footer>
    <div class="col"><p class="col-title">[COMPANY NAME]</p><p>WC4J+V8F, Mosta, Malta</p></div>
    <div class="col"><p class="col-title">Contact</p><p><a href="mailto:studio@companyname.mt">studio@companyname.mt</a></p><p><a href="tel:+35621234567">+356 2123 4567</a></p></div>
    <div class="col"><p class="col-title">Hours</p><p>Mon–Fri, 9:00–17:00</p></div>
    <div class="col"><p class="col-title">Follow</p><p><a href="#">Instagram</a></p></div>
  </footer>
</div>
<script src="image-slot.js"></script>
<script src="projects-data.js"></script>
<script>
(async () => {
  const grid = document.getElementById('grid');
  const projects = await loadProjects();
  grid.innerHTML = projects.map(projectCardHTML).join('');
  wireSiteSearch(projects);
  const cards = [...grid.children];
  const search = document.getElementById('search');
  const types = new Set(), locs = new Set();

  function wireGroup(id, key, set) {
    const group = document.getElementById(id);
    group.addEventListener('click', (e) => {
      const btn = e.target.closest('.chip');
      if (!btn) return;
      const val = btn.dataset[key];
      if (val === 'all') {
        set.clear();
        [...group.children].forEach(c => c.setAttribute('aria-pressed', c === btn ? 'true' : 'false'));
      } else {
        const allBtn = group.querySelector(`[data-${key}="all"]`);
        if (set.has(val)) { set.delete(val); btn.setAttribute('aria-pressed', 'false'); }
        else { set.add(val); btn.setAttribute('aria-pressed', 'true'); }
        allBtn.setAttribute('aria-pressed', set.size ? 'false' : 'true');
      }
      apply();
    });
  }
  wireGroup('type-filters', 'type', types);
  wireGroup('loc-filters', 'loc', locs);
  search.addEventListener('input', apply);

  function apply() {
    const q = search.value.trim().toLowerCase();
    let visible = 0;
    cards.forEach(card => {
      const matchType = types.size === 0 || types.has(card.dataset.type);
      const matchLoc = locs.size === 0 || locs.has(card.dataset.loc);
      const matchQ = !q || card.dataset.name.includes(q);
      const show = matchType && matchLoc && matchQ;
      card.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    document.getElementById('empty').style.display = visible ? 'none' : 'block';
  }

  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { entry.target.classList.add('is-visible'); io.unobserve(entry.target); }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });
  const revealEls = [...document.querySelectorAll('.reveal, .reveal-stagger')];
  revealEls.forEach(el => io.observe(el));
  function checkFallback() {
    revealEls.forEach(el => {
      if (el.classList.contains('is-visible')) return;
      const r = el.getBoundingClientRect();
      if (r.top < window.innerHeight - 40 && r.bottom > 0) el.classList.add('is-visible');
    });
  }
  checkFallback();
  window.addEventListener('scroll', checkFallback, { passive: true });
  window.addEventListener('resize', checkFallback);

  document.querySelectorAll('.btn-primary').forEach(btn => {
    function edgeOffset(e) {
      const r = btn.getBoundingClientRect();
      const relY = (e.clientY - r.top) / r.height;
      return relY < 0.5 ? ['0%', '-100%'] : ['0%', '100%'];
    }
    btn.addEventListener('mouseenter', e => {
      const [fx, fy] = edgeOffset(e);
      btn.style.setProperty('--fx', fx);
      btn.style.setProperty('--fy', fy);
      btn.classList.add('fill-in');
    });
    btn.addEventListener('mouseleave', e => {
      const [fx, fy] = edgeOffset(e);
      btn.classList.remove('fill-in');
      btn.style.setProperty('--fx', fx);
      btn.style.setProperty('--fy', fy);
    });
  });
})();
</script>
</body>
</html>
